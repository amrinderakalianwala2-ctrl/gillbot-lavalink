app = "gillbot-lavalink"
primary_region = "sin"

[build]

[env]
  _JAVA_OPTIONS = "-Xmx200m -Xms64m"

[http_service]
  internal_port = 2333
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
